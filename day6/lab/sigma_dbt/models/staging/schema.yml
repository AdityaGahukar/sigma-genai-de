version: 2

sources:
  - name: sigma_analytics
    database: SIGMA_DE
    schema: PUBLIC

    tables:
      - name: fact_transactions
      - name: dim_merchant
      - name: dim_customer

models:
  - name: stg_fact_transactions
    description: "Staging table for fact_transactions from sigma_analytics"

    columns:
      - name: transaction_id
        description: "Unique identifier for each transaction"
        tests:
          - not_null
          - unique

      - name: amount
        description: "Amount of the transaction in USD"

      - name: status
        description: "Status of the transaction: COMPLETED, FAILED, PENDING"
        tests:
          - accepted_values:
              values: ['COMPLETED', 'FAILED', 'PENDING']

      - name: merchant_id
        description: "Foreign key to dim_merchant"
        tests:
          - not_null

      - name: customer_id
        description: "Foreign key to dim_customer"
        tests:
          - not_null

      - name: transaction_date
        description: "Date of the transaction"

      - name: payment_method
        description: "Payment method used: CREDIT_CARD, DEBIT_CARD, UPI"
        tests:
          - accepted_values:
              values: ['CREDIT_CARD', 'DEBIT_CARD', 'UPI']

  - name: stg_dim_merchant
    description: "Staging table for dim_merchant from sigma_analytics"

    columns:
      - name: merchant_id
        description: "Unique identifier for each merchant"
        tests:
          - not_null
          - unique

      - name: merchant_name
        description: "Name of the merchant"

      - name: category
        description: "Category of the merchant"

      - name: city
        description: "City where the merchant is located"

      - name: onboarded_date
        description: "Date when the merchant was onboarded"

  - name: stg_dim_customer
    description: "Staging table for dim_customer from sigma_analytics"

    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - not_null
          - unique

      - name: customer_name
        description: "Name of the customer"

      - name: email
        description: "Email address of the customer"

      - name: tier
        description: "Customer tier"
        tests:
          - accepted_values:
              values: ['GOLD', 'SILVER', 'BRONZE']

      - name: signup_date
        description: "Date when the customer signed up"

      - name: city
        description: "City where the customer is located"